name: Dependabot add changie file
on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write
  issues: write
  repository-projects: write
  contents: write

jobs:
  dependabot-changie:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.id == 49699333
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Create change file
        uses: miniscruff/changie-action@11bcad388e7973948cbcecb10863baf024d5f607 # v3.0.0
        with:
          version: latest
          args: new --body "${{ github.event.pull_request.title }}" --kind Dependency

      - uses: stefanzweifel/git-auto-commit-action@acbe8b15bfea3c08ecd23f3a982067a91e34533e # v7-next
        with:
          commit_message: "chore(deps): add changelog for dependabot updates"
          commit_user_name: "dependabot[bot]"
          commit_user_email: "dependabot[bot]@users.noreply.github.com"
